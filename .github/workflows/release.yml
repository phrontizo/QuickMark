name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive version
        run: |
          MARKETING="${VERSION#v}"
          if ! [[ "$MARKETING" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Error: Tag must be in format vX.Y or vX.Y.Z (e.g., v1.1 or v1.1.0)"
            exit 1
          fi
          BUILD=$(git rev-list --count HEAD)
          echo "MARKETING_VERSION=$MARKETING" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify library integrity
        run: |
          shasum -a 256 -c - <<'SUMS'
          38c70a1e7ca91ab40e2d9e6e60129851a717ed1c7d4acbbdd41bf9503791cf68  Markdown/Resources/markdown-it.min.js
          4f3b23f41bb3787957da2602fbccc4df0d017928c1fce62583159e096b832a81  Markdown/Resources/markdown-it-task-lists.min.js
          d6fee58a3b56c5742fa18f3e01f1d317cc99975683ebd39c9195cb2aff0c2e42  Markdown/Resources/markdown-it-footnote.min.js
          9ae7874d506368f9628f0ab85ba982cbe6816fff68592fbaf4a9581e86496d4b  Markdown/Resources/markdownItAnchor.umd.js
          b01b706e6d23e8270a55228fdba35b557127b6f2af5b4c23ca22b15bdbd1c09d  Markdown/Resources/texmath.min.js
          8d886ea32b7d159ca2fe4acf396d227a539edb0b474a3d166d6afb6da3834d40  Markdown/Resources/texmath.min.css
          c4a399dd6f488bc97a3546e3476747b3e714c99c57b9473154c6fb8d259b9381  SharedResources/highlight.min.js
          ac3febc3ba29f570bc72056a03a0a7d60d2f8e4f5bc3fde59bdb68e28f76134e  SharedResources/hljs-themes.css
          863811e2baa0849c77bc92d26d44f4d0a4843c2a8ab52c462017dea57316e4d8  Markdown/Resources/katex.min.js
          e2c4d6bafa5e96099411c20ec17857fe038f202b8ec4bb24b7f74f6bf4c282df  Markdown/Resources/katex-inlined.min.css
          a43bc1afd446f9c4cc66ac5dd45d02e8d65e26fc5344ec0ef787f88d6ddb6f9e  Markdown/Resources/mermaid.min.js
          a288ecea83e956cf8f40aa6a3fe8e604c790ba46e767498dbba4049d209c366b  SharedResources/viewer-static.min.js
          SUMS

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Test
        run: |
          xcodebuild test \
            -scheme QuickMark \
            -destination "platform=macOS" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_IDENTITY="-" \
            -quiet

      - name: Build Release
        run: |
          xcodebuild build \
            -scheme QuickMark \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            -quiet

      - name: Create DMG
        run: |
          APP_PATH=$(find build/DerivedData -name "QuickMark.app" -type d | head -1)
          DMG_NAME="QuickMark-${VERSION}.dmg"
          STAGING="build/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          cp LICENCE.txt "$STAGING/"
          cp THIRD-PARTY-NOTICES "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "QuickMark" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Notarise DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_OUT=$(xcrun notarytool submit "QuickMark-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)

          echo "$SUBMIT_OUT"
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")

          if [ "$STATUS" != "Accepted" ]; then
            SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            echo "::error::Notarisation failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple "QuickMark-${VERSION}.dmg"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuickMark ${{ env.MARKETING_VERSION }}"
          files: "QuickMark-${{ env.VERSION }}.dmg"
          generate_release_notes: true
