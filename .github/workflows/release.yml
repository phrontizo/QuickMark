name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.1.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test
        run: xcodebuild test -scheme QuickMark -destination "platform=macOS" -quiet

      - name: Bump version
        run: ./scripts/bump-version.sh "${{ github.event.inputs.version }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add QuickMark/Info.plist Markdown/Info.plist DrawIO/Info.plist
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

      - name: Build Release
        run: |
          xcodebuild build \
            -scheme QuickMark \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            -quiet

      - name: Create DMG
        run: |
          APP_PATH=$(find build/DerivedData -name "QuickMark.app" -type d | head -1)
          DMG_NAME="QuickMark-v${{ github.event.inputs.version }}.dmg"
          STAGING="build/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "QuickMark" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "QuickMark v${{ github.event.inputs.version }}"
          files: "QuickMark-v${{ github.event.inputs.version }}.dmg"
          generate_release_notes: true
