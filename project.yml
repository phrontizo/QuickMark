name: QuickMark
options:
  bundleIdPrefix: com.quickmark
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "2630"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
schemes:
  QuickMark:
    build:
      targets:
        QuickMark: all
        QuickMarkTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuickMarkTests
targets:
  QuickMark:
    type: application
    platform: macOS
    sources:
      - path: QuickMark
      - path: Shared
    info:
      path: QuickMark/Info.plist
      properties:
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.jgraph.drawio
            UTTypeDescription: Draw.io Diagram
            UTTypeConformsTo:
              - public.xml
            UTTypeTagSpecification:
              public.filename-extension:
                - drawio
    dependencies:
      - target: QuickMarkPreview
        embed: true
        codeSign: true
      - target: QuickMarkDrawio
        embed: true
        codeSign: true
  QuickMarkPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: Markdown
        excludes:
          - "Resources/**"
      - path: Markdown/Resources
        buildPhase: resources
    info:
      path: Markdown/Info.plist
      properties:
        CFBundleDisplayName: Markdown Preview
        NSExtension:
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - public.markdown
              - net.daringfireball.markdown
              - net.ia.markdown
              - com.unknown.md
              - io.typora.markdown
              - com.nutstore.down
              - com.rstudio.rmarkdown
              - org.quarto.qmarkdown
              - org.apiblueprint.file
              - org.textbundle.package
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
    entitlements:
      path: Markdown/Markdown.entitlements
      properties:
        com.apple.security.temporary-exception.files.absolute-path.read-only:
          - /
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.quickmark.QuickMark.QuickMarkPreview
      ENABLE_APP_SANDBOX: YES
      ENABLE_HARDENED_RUNTIME: YES
      ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
      ENABLE_USER_SELECTED_FILES: readonly
  QuickMarkDrawio:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: DrawIO
        excludes:
          - "Resources/**"
      - path: DrawIO/Resources
        buildPhase: resources
    info:
      path: DrawIO/Info.plist
      properties:
        CFBundleDisplayName: Draw.io Preview
        NSExtension:
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - com.jgraph.drawio
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.jgraph.drawio
            UTTypeDescription: Draw.io Diagram
            UTTypeConformsTo:
              - public.xml
            UTTypeTagSpecification:
              public.filename-extension:
                - drawio
    entitlements:
      path: DrawIO/DrawIO.entitlements
      properties:
        com.apple.security.temporary-exception.files.absolute-path.read-only:
          - /
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.quickmark.QuickMark.QuickMarkDrawio
      ENABLE_APP_SANDBOX: YES
      ENABLE_HARDENED_RUNTIME: YES
      ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
      ENABLE_USER_SELECTED_FILES: readonly
  QuickMarkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Shared
      - path: QuickMarkTests
      - path: Markdown/MarkdownProcessor.swift
        type: file
      - path: Markdown/HTMLBuilder.swift
        type: file
      - path: Markdown/Resources
        buildPhase: resources
    entitlements:
      path: QuickMarkTests/QuickMarkTests.entitlements
      properties:
        com.apple.security.temporary-exception.files.absolute-path.read-only:
          - /
    settings:
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_APP_SANDBOX: YES
      ENABLE_HARDENED_RUNTIME: YES
      ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
